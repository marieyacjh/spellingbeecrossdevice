<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spelling Bee: Classroom Master</title>
    <style>
        :root {
            --honey-yellow: #fff9c4;
            --bee-yellow: #ffeb3b;
            --bee-black: #333333;
            --soft-white: #ffffff;
            --success-green: #4caf50;
        }

        body {
            font-family: "Comic Sans MS", "Comic Sans", "Chalkboard SE";
            background-color: var(--soft-white);
            color: var(--bee-black);
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .screen { display: none; min-height: 100vh; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .active { display: flex; }
        h1 { font-size: 3rem; text-align: center; margin: 10px 0; }

        .btn {
            background-color: var(--bee-yellow); border: 4px solid var(--bee-black);
            border-radius: 20px; padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; margin: 10px; box-shadow: 0 5px 0 var(--bee-black);
        }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--bee-black); }
        .btn-small { padding: 8px 15px; font-size: 0.9rem; border-radius: 12px; }
        
        .display-area { font-size: 2.5rem; font-weight: bold; height: 60px; margin: 10px; border-bottom: 5px solid var(--bee-black); text-align: center; min-width: 200px; }
        
        .keyboard { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 5px; }
        .key {
            min-width: 40px; height: 50px; margin: 2px; background: #fff;
            border: 2px solid var(--bee-black); border-radius: 8px;
            display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        #link-output {
            width: 90%; word-break: break-all; background: #eee; padding: 10px;
            border-radius: 10px; margin: 10px 0; font-size: 0.8rem; display: none;
        }

        .duel-container { display: flex; width: 100vw; height: 70vh; }
        .team-side { flex: 1; display: flex; flex-direction: column; align-items: center; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div id="menu-screen" class="screen active">
        <h1>🐝 SPELLING BEE</h1>
        <div id="loaded-status" style="color: green; font-weight: bold; margin-bottom: 10px; display:none;">✅ List Loaded!</div>
        <button class="btn" onclick="openModeSelect('practice')">PRACTICE</button>
        <button class="btn" onclick="openModeSelect('duel')">TEAM DUEL</button>
        <button class="btn" onclick="showScreen('edit-screen')">TEACHER: CREATE LIST</button>
    </div>

    <div id="edit-screen" class="screen">
        <h2>CREATE LIST</h2>
        <p>Type words (one per line):</p>
        <textarea id="word-input" rows="8" style="width:80%;"></textarea>
        <button class="btn" onclick="generateLink()">GENERATE GAME LINK</button>
        
        <div id="link-output-area" style="display:none; text-align: center; width: 100%;">
            <p><b>Copy this link for students:</b></p>
            <div id="link-output"></div>
            <button class="btn btn-small" onclick="copyLink()">COPY LINK</button>
            <button class="btn btn-small" onclick="showScreen('menu-screen')">DONE</button>
        </div>
    </div>

    <div id="mode-screen" class="screen">
        <button class="btn btn-small" onclick="showScreen('menu-screen')">BACK</button>
        <h2>CHOOSE STYLE</h2>
        <button class="btn" onclick="startGame('spell')">SPELL IT</button>
        <button class="btn" onclick="startGame('unscramble')">UNSCRAMBLE</button>
    </div>

    <div id="game-screen" class="screen">
        <button class="btn" onclick="speakWord()">🔊 LISTEN</button>
        <div id="p-play"></div>
        <button id="next-btn-p" class="btn" style="background:var(--success-green); display:none;" onclick="nextWord()">NEXT ➔</button>
    </div>

    <div id="duel-screen" class="screen" style="padding:0;">
        <div class="duel-container">
            <div class="team-side" id="l-play"></div>
            <div class="team-side" id="r-play"></div>
        </div>
        <button class="btn" onclick="speakWord()">🔊 LISTEN</button>
        <button id="next-btn-duel" class="btn" style="background:var(--success-green); display:none;" onclick="nextWord()">NEXT ➔</button>
    </div>

    <script>
        let currentWords = ["Example", "Word", "List"];
        let wordIndex = 0;
        let gameMode = 'practice';
        let gameStyle = 'spell';
        const qwerty = [["Q","W","E","R","T","Y","U","I","O","P"], ["A","S","D","F","G","H","J","K","L"], ["Z","X","C","V","B","N","M"]];

        // --- URL LOGIC (THE MAGIC) ---
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const data = urlParams.get('words');
            if (data) {
                try {
                    // Decodes the long string back into an array
                    currentWords = JSON.parse(atob(data));
                    document.getElementById('loaded-status').style.display = 'block';
                    document.getElementById('word-input').value = currentWords.join('\n');
                } catch (e) {
                    console.error("Link error", e);
                }
            }
        };

        function generateLink() {
            const list = document.getElementById('word-input').value.split('\n').filter(x => x.trim());
            if(!list.length) return alert("Enter some words first!");
            
            // Encodes the list into a Base64 string
            const encoded = btoa(JSON.stringify(list));
            const baseUrl = window.location.href.split('?')[0];
            const fullLink = baseUrl + "?words=" + encoded;

            const output = document.getElementById('link-output');
            output.innerText = fullLink;
            output.style.display = 'block';
            document.getElementById('link-output-area').style.display = 'block';
        }

        function copyLink() {
            const link = document.getElementById('link-output').innerText;
            navigator.clipboard.writeText(link);
            alert("Link copied! Paste this into Google Classroom or Seesaw.");
        }

        // --- GAME CORE ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function openModeSelect(mode) { gameMode = mode; showScreen('mode-screen'); }

        function startGame(style) {
            gameStyle = style;
            wordIndex = 0;
            showScreen(gameMode === 'practice' ? 'game-screen' : 'duel-screen');
            loadRound();
        }

        function loadRound() {
            document.getElementById('next-btn-p').style.display = 'none';
            document.getElementById('next-btn-duel').style.display = 'none';
            if(gameMode === 'practice') render('p-play', 'p');
            else { render('l-play', 'l'); render('r-play', 'r'); }
        }

        function render(containerId, side) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<div id="${side}-display" class="display-area"></div>`;
            const kb = document.createElement('div'); kb.className = "keyboard";
            qwerty.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = "kb-row";
                row.forEach(l => {
                    const k = document.createElement('div'); k.className = "key"; k.innerText = l;
                    k.onclick = () => {
                        const d = document.getElementById(side + "-display");
                        d.innerText += l;
                        if(d.innerText.toUpperCase() === currentWords[wordIndex].toUpperCase()) {
                            d.style.color = "green";
                            showNext();
                        }
                    };
                    rowDiv.appendChild(k);
                });
                kb.appendChild(rowDiv);
            });
            container.appendChild(kb);
        }

        function showNext() {
            document.getElementById('next-btn-p').style.display = 'block';
            document.getElementById('next-btn-duel').style.display = 'block';
        }

        function nextWord() {
            wordIndex++;
            if(wordIndex >= currentWords.length) {
                alert("All done!");
                showScreen('menu-screen');
            } else {
                loadRound();
            }
        }

        function speakWord() {
            const u = new SpeechSynthesisUtterance(currentWords[wordIndex]);
            window.speechSynthesis.speak(u);
        }
    </script>
</body>
</html>
